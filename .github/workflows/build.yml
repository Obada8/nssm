name: Build NSSM

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: win32
            platform: Win32
            outdir: win32
          - name: win64
            platform: x64
            outdir: win64

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Upgrade old Visual Studio project
        shell: cmd
        run: |
          set DEVENV="%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\devenv.com"
          if not exist %DEVENV% set DEVENV="%ProgramFiles%\Microsoft Visual Studio\2022\Professional\Common7\IDE\devenv.com"
          if not exist %DEVENV% set DEVENV="%ProgramFiles%\Microsoft Visual Studio\2022\Community\Common7\IDE\devenv.com"
          echo Using %DEVENV%
          %DEVENV% nssm.sln /Upgrade
          dir /s *.vcxproj

      - name: Force VS2022 toolset
        shell: pwsh
        run: |
          $txt = Get-Content "nssm.vcxproj" -Raw
          $txt = $txt -replace "<PlatformToolset>.*?</PlatformToolset>", "<PlatformToolset>v143</PlatformToolset>"
          Set-Content "nssm.vcxproj" $txt -Encoding UTF8

      - name: Patch version.cmd
        shell: cmd
        run: |
          > version.cmd echo @echo off
          >> version.cmd echo echo #define NSSM_VERSION _T("2.24") ^> version.h
          >> version.cmd echo echo #define NSSM_VERSIONINFO 2,24,0,0 ^>^> version.h
          >> version.cmd echo echo #define NSSM_DATE _T("%DATE%") ^>^> version.h
          >> version.cmd echo echo #define NSSM_FILEFLAGS 0L ^>^> version.h
          >> version.cmd echo echo #define NSSM_COPYRIGHT _T("Public Domain; Author Iain Patterson 2003-2017") ^>^> version.h
          type version.cmd

      - name: Build NSSM
        shell: cmd
        run: |
          echo Building ${{ matrix.name }} > build-${{ matrix.name }}.log
          msbuild nssm.vcxproj /p:Configuration=Release /p:Platform="${{ matrix.platform }}" /p:PlatformToolset=v143 /m /v:normal >> build-${{ matrix.name }}.log 2>&1
          set BUILD_EXIT=%ERRORLEVEL%
          type build-${{ matrix.name }}.log
          exit /b %BUILD_EXIT%

      - name: Show output files
        if: always()
        shell: cmd
        run: |
          dir /s out
          dir /s *.exe

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: nssm-${{ matrix.name }}
          path: out/Release/${{ matrix.outdir }}/nssm.exe

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.name }}
          path: build-${{ matrix.name }}.log
